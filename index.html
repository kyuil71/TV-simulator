<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV 리모콘 시뮬레이터 (v123 - Reference Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #111;
            user-select: none;
            -webkit-user-select: none;
        }
        .remote-button:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }
        .remote-button.active-key, .d-pad-button.active-key {
            transform: scale(0.95);
            filter: brightness(1.2);
            border-color: #fff;
        }
        #tv-screen {
            background-color: #000;
            position: relative;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 16 / 9;
            container-type: inline-size;
        }
        #tv-video-player, #tv-iframe-player {
            object-fit: cover;
            transition: opacity 0.5s;
            width: 100%; height: 100%;
            border: none;
        }
        .osd-container {
            background-color: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            color: white;
            border-radius: 9999px;
            padding: 1cqw 2cqw;
            display: flex;
            align-items: center;
            gap: 1.5cqw;
            transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
        }
        .d-pad-container {
            display: grid;
            grid-template-areas: "music up standby" "left ok right" ". down .";
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 0.5rem;
            align-items: center;
            justify-items: center;
        }
        #btn-standby { grid-area: standby; }
        #btn-music { grid-area: music; } 
        #d-pad-up { grid-area: up; }
        #d-pad-left { grid-area: left; }
        #d-pad-ok { grid-area: ok; }
        #d-pad-right { grid-area: right; }
        #d-pad-down { grid-area: down; }
        .d-pad-button {
            background-color: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 50%;
            width: 4rem; height: 4rem;
            display: flex; align-items: center; justify-content: center;
            color: #e4e4e7;
            transition: all 0.15s;
            cursor: pointer;
        }
        .d-pad-button:active { background-color: #3f3f46; transform: scale(0.92); }
        #d-pad-ok { background-color: #3f3f46; border-color: #52525b; font-weight: 600; }
        .loader {
            width: 1.25rem; height: 1.25rem;
            border: 2px solid #FFF; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            box-sizing: border-box; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #gemini-recommendation-tray .gemini-item {
            flex-shrink: 0; position: relative;
            width: 18cqw; 
            height: 12cqw;
            background-color: #1c1c1e; border-radius: 1cqw; overflow: hidden;
            cursor: pointer; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s, box-shadow 0.3s;
            border: 0.3cqw solid transparent; 
            box-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.5);
            box-sizing: border-box;
            scroll-margin: 2cqw;
        }
        #gemini-recommendation-tray .gemini-item.dpad-focused {
            border-color: #ffffff;
            box-shadow: 0 0 2.5cqw rgba(255, 255, 255, 0.8);
            transform: scale(1.08);
            z-index: 10;
        }
        #gemini-recommendation-tray .gemini-item video, #gemini-recommendation-tray .gemini-item img { width: 100%; height: 100%; object-fit: cover; }
        #gemini-recommendation-tray .gemini-item-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 1cqw;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        #gemini-recommendation-tray .gemini-item-title { font-weight: 600; color: #fff; font-size: 1.1cqw; line-height: 1.2; margin-bottom: 0.1cqw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #gemini-recommendation-tray .gemini-item-channel { color: #d1d5db; font-size: 0.9cqw; font-weight: 500; opacity: 0.8; }
        
        #gemini-recommendation-tray .overflow-x-auto { 
            -ms-overflow-style: none; scrollbar-width: none; 
            mask-image: linear-gradient(to right, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 95%, transparent 100%);
            scroll-behavior: smooth;
            padding-bottom: 2cqw;
        }
        #gemini-recommendation-tray .overflow-x-auto::-webkit-scrollbar { display: none; }

        #home-iot-overlay {
            background-color: rgba(30, 30, 35, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 2cqw;
            box-shadow: 0 2cqw 5cqw rgba(0,0,0,0.5);
            transition: opacity 0.3s; 
            pointer-events: auto;
        }
        .room-division {
            position: absolute; border: 0.1cqw solid rgba(255, 255, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.03);
            display: flex; align-items: center; justify-content: center;
        }
        .room-label { font-size: 0.8cqw; color: rgba(255,255,255,0.7); font-weight: 600; letter-spacing: 0.05em; }
        .iot-item {
            position: absolute; transform: translate(-50%, -50%); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0.5cqw 1cqw rgba(0,0,0,0.3); z-index: 50;
            cursor: pointer; 
            width: 3.5cqw; height: 3.5cqw; border-radius: 50%;
            background: #27272a; color: #a1a1aa;
        }
        .iot-item.focused { 
            border: 0.3cqw solid #f97316;
            box-shadow: 0 0 1.5cqw rgba(249, 115, 22, 0.6); 
            transform: translate(-50%, -50%) scale(1.25); 
            z-index: 60; 
        }
        .iot-item.on {
            background: #fcd34d !important; color: #451a03 !important;
            box-shadow: 0 0 2.5cqw rgba(252, 211, 77, 0.6) !important; transform: translate(-50%, -50%) scale(1.15) !important; z-index: 70;
        }
        .iot-item i, .iot-item svg { width: 1.8cqw; height: 1.8cqw; }
        
        @keyframes vacuum-move {
            0% { left: 40%; top: 40%; }
            25% { left: 65%; top: 20%; }
            50% { left: 55%; top: 70%; }
            75% { left: 45%; top: 30%; }
            100% { left: 40%; top: 40%; }
        }
        .vacuum-cleaning { animation: vacuum-move 12s linear infinite !important; }
        
        #standby-overlay-content {
            transform: scale(0.4); 
            transform-origin: top right; 
            position: absolute;
            top: 4cqw;   
            right: 4cqw; 
        }
        #standby-overlay { 
            background-color: black; 
            transition: opacity 1s ease-in-out; 
            z-index: 30; 
            width: 100%;
            height: 100%;
        }
        #music-app-overlay {
            transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            top: 50%;
            right: 3rem;
            left: auto;
            transform: translateY(-50%) scale(0.55); 
            transform-origin: right center; 
        }
        #music-app-overlay.active {
            opacity: 1;
            transform: translateY(-50%) scale(0.55);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .music-channel-item.active {
            background-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body class="bg-neutral-900 min-h-screen flex flex-col items-center justify-center p-6 text-white select-none">

                    </div>
                    <div class="flex-none px-8 pt-2 pb-2 flex flex-col items-center">
                        <div class="w-44 h-44 rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.4)] overflow-hidden mb-4">
                            <img id="music-album-art" src="" alt="Album" class="w-full h-full object-cover">
                        </div>
                        <div class="w-full text-center px-2 mb-4">
                            <h1 id="music-title" class="text-xl font-bold text-white mb-0.5 truncate">Title</h1>

                    </div>
                </div>
            </div>
            
            <!-- 대기 모드 오버레이 -->
            <div id="standby-overlay" class="absolute top-0 left-0 w-full h-full hidden flex flex-col justify-start items-end p-8"> 
                <div id="standby-overlay-content" class="flex flex-col items-end text-right">
                    <div id="standby-time" class="text-[20cqw] font-sf-display text-white/90 drop-shadow-2xl leading-none">12:00</div>
                    <div class="flex flex-row items-center justify-end gap-[4cqw] mt-[2cqw]">
                        <div id="standby-date" class="text-[5cqw] font-light tracking-wide text-white/60 uppercase">MON, JAN 1</div>
                    </div>
                </div>
            </div>

            <!-- Gemini 추천 트레이 (pt-[4cqw]로 확대 시 테두리 잘림 해결) -->

                <div class="flex overflow-x-auto gap-[1.5cqw] pt-[4cqw] pb-[2cqw] items-end px-[1cqw]"></div>
            </div>

            <!-- OSD 레이어 (채널/볼륨 표시) -->
            <div id="tv-ui-overlay" class="absolute top-0 left-0 w-full h-full z-20 hidden pointer-events-none">
                <div class="relative w-full h-full p-[4cqw]">
                    <div id="osd-channel-bar" class="osd-container absolute top-[4cqw] left-[4cqw]">
                        <div class="flex items-baseline gap-[1cqw]">
                            <span id="osd-channel-num" class="text-[4cqw] font-light tracking-tighter">1</span>
                            <span id="osd-channel-name" class="text-[2.2cqw] font-medium text-white/90 truncate max-w-[25cqw]">Channel Name</span>

                    </div>
                    <div id="osd-volume-bar" class="osd-container absolute top-[4cqw] right-[4cqw]">
                        <div class="flex items-center gap-[1cqw]">
                            <i id="osd-vol-icon" data-lucide="volume-2" style="width: 2.5cqw; height: 2.5cqw;" class="text-white/80"></i>
                            <span id="osd-volume-text" class="text-[2.2cqw] font-semibold">10</span>

                    <div class="room-division" style="top: 0; right: 0; width: 25%; height: 40%; border-top-right-radius: 0.5cqw;"><span class="room-label">KITCHEN</span></div>
                    <div class="room-division" style="bottom: 0; right: 0; width: 25%; height: 40%; border-bottom-right-radius: 0.5rem;"><span class="room-label">BATH</span></div>

                    <div id="iot-6" class="iot-item vacuum-cleaner" style="bottom: 10%; left: 40%;"><i data-lucide="wind"></i></div>
                    <div id="iot-7" class="iot-item" style="bottom: 10%; left: 60%;"><i data-lucide="lightbulb"></i></div>

    <!-- 리모콘 레이아웃 -->
    <div class="w-full max-w-xs bg-black rounded-[2.5rem] p-6 shadow-2xl border border-zinc-800" style="transform: scale(0.5); transform-origin: top center;">
        <div class="flex flex-col gap-6">
            <div class="flex gap-4">
                <button id="power-button" class="remote-button remote-btn-style w-1/2 h-14 text-red-500 font-bold">POWER</button>

    <script>
    // --- Data Configuration (8 Channels Repeat to 30) ---
    const SCALES = { dream: [0, 4, 7, 11, 14], jazz: [0, 3, 7, 10, 14], folk: [0, 2, 4, 7, 9], mystic: [0, 2, 4, 6, 9], deep: [0, 5, 7, 12] };
    const musicChannels = [
        { id: 1, title: "Sunset Drive", artist: "Dreamy Synthwave", imageUrl: "https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?q=80&w=800&auto=format&fit=crop", baseFreq: 261.63, scale: 'dream', style: 'synth_pop', bpm: 100 },
        { id: 2, title: "Rainy Jazz", artist: "Piano & Ambience", imageUrl: "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=800&auto=format&fit=crop", baseFreq: 220.00, scale: 'jazz', style: 'piano_ballad', bpm: 60 },
        { id: 3, title: "Campfire", artist: "Acoustic Guitar", imageUrl: "https://images.unsplash.com/photo-1478131143081-80f7f84ca84d?q=80&w=800&auto=format&fit=crop", baseFreq: 146.83, scale: 'folk', style: 'guitar_picking', bpm: 80 },
        { id: 4, title: "Secret Garden", artist: "Harp & Nature", imageUrl: "https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=800&auto=format&fit=crop", baseFreq: 329.63, scale: 'mystic', style: 'fantasy_chimes', bpm: 0 },
        { id: 5, title: "Deep Sleep", artist: "Ocean Strings", imageUrl: "https://images.unsplash.com/photo-1551244072-5d12893278ab?q=80&w=800&auto=format&fit=crop", baseFreq: 98.00, scale: 'deep', style: 'drone_pad', bpm: 0 }
    ];

    const channelData = [
        { title: "Sintel Trailer", url: "https://media.w3.org/2010/05/sintel/trailer.mp4#t=3" },
        { title: "MLB Highlights", url: "https://res.cloudinary.com/demo/video/upload/MLB_Vid.mp4" },
        { title: "Evolve Platform Video", url: "https://videos.evolveplatform.net/videos/Q4Mnc1HUjSvfMRHTjcQfZOQ7jDMpfMXDAcPEFwrr_4010608385.mp4#t=2" },
        { title: "Ski Jump", url: "https://res.cloudinary.com/demo/video/upload/ski_jump.mp4" },
        { title: "Elephants Dream", url: "https://archive.org/download/ElephantsDream/ed_1024_512kb.mp4#t=5" },
        { title: "Big Buck Bunny", url: "https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/720/Big_Buck_Bunny_720_10s_1MB.mp4#t=3" },
        { title: "Friday Life", url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/friday.mp4#t=1" },
        { title: "Coastal Drone Flight", url: "https://videos.evolveplatform.net/videos/cyrtcYHQ5WRjWwvw5dz1p3ZoL7aKNxRoyCiX7Vx0_4050359033.mp4#t=3" }
    ];

    const videoChannelMap = [null]; 
    for (let i = 1; i <= 30; i++) { videoChannelMap[i] = channelData[(i - 1) % channelData.length]; }

    // --- State Management ---
    let state = {
        isPowerOn: false, currentChannel: 1, currentVolume: 50, isMuted: false, lastChannel: 1, lastVolume: 50,
        isGeminiLoading: false, isGeminiTrayOpen: false, isHomeMode: false, isStandbyMode: false, isMusicMode: false, 
        recommendations: [], focusedRecommendationIndex: 0,
        iotItems: [{ id:0, type:'audio', on:false }, { id:1, type:'light', on:false }, { id:2, type:'light', on:false }, { id:3, type:'light', on:false }, { id:4, type:'light', on:false }, { id:5, type:'light', on:false }, { id:6, type:'vacuum', on:false }, { id:7, type:'light', on:false }],
        focusedIotIndex: 3,
    };

    let musicState = { isPlaying: false, currentChannel: musicChannels[0], volume: 70, ctx: null, masterGain: null, reverb: null, sequencer: null };
    let clickSynth, confirmSynth, musicLoop, uiTimeout, clockInterval;
    let playPromise = null;

    document.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) lucide.createIcons();

        const tvVideo = document.getElementById('tv-video-player');
        const tvIframe = document.getElementById('tv-iframe-player');

        // --- Music Functions ---
        function initMusicAudio() {
            if (!musicState.ctx && (window.AudioContext || window.webkitAudioContext)) {
                musicState.ctx = new (window.AudioContext || window.webkitAudioContext)();
                musicState.masterGain = musicState.ctx.createGain();
                musicState.masterGain.connect(musicState.ctx.destination);
                const duration = 3, length = musicState.ctx.sampleRate * duration;
                const impulse = musicState.ctx.createBuffer(2, length, musicState.ctx.sampleRate);
                for (let i = 0; i < length; i++) {
                    const decay = Math.pow(1 - i / length, 2);
                    impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * decay;
                    impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * decay;
                }
                musicState.reverb = musicState.ctx.createConvolver();
                musicState.reverb.buffer = impulse;
                musicState.reverb.connect(musicState.masterGain);
            }
            if (musicState.ctx) musicState.ctx.resume();
        }

        function playInstrument(freq, type, duration, time, vol = 0.1) {
            if (!musicState.ctx || !musicState.isPlaying) return;
            const ctx = musicState.ctx, masterGain = musicState.masterGain, osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator(), gain = ctx.createGain(), filter = ctx.createBiquadFilter();
            if (type === 'piano') { osc1.type = 'triangle'; osc2.type = 'sine'; gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(vol, time + 0.02); gain.gain.exponentialRampToValueAtTime(0.001, time + duration); filter.type = 'lowpass'; filter.frequency.value = 3000; }
            else if (type === 'pad') { osc1.type = 'sawtooth'; osc2.type = 'triangle'; osc2.detune.value = -10; gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(vol*0.5, time + 0.5); gain.gain.exponentialRampToValueAtTime(0.001, time + duration + 1); filter.type = 'lowpass'; filter.frequency.value = 800; }
            else if (type === 'bass') { osc1.type = 'sawtooth'; osc2.type = 'square'; osc2.frequency.value = freq/2; gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(vol, time + 0.05); filter.type = 'lowpass'; filter.frequency.value = 400; }
            else if (type === 'bell') { osc1.type = 'sine'; osc2.type = 'sine'; osc2.frequency.value = freq * 2; gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(vol, time + 0.01); filter.type = 'highpass'; filter.frequency.value = 1000; }
            else if (type === 'kick') { osc1.type = 'sine'; osc1.frequency.setValueAtTime(150, time); osc1.frequency.exponentialRampToValueAtTime(0.01, time + 0.5); gain.gain.setValueAtTime(vol, time); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.5); osc1.connect(gain); gain.connect(masterGain); osc1.start(time); osc1.stop(time + 0.6); return; }
            else if (type === 'hihat') { const bufferSize = ctx.sampleRate * 0.1, buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate), data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; const noise = ctx.createBufferSource(); noise.buffer = buffer; const noiseFilter = ctx.createBiquadFilter(); noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 5000; const noiseGain = ctx.createGain(); noiseGain.gain.setValueAtTime(vol*0.4, time); noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05); noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterGain); noise.start(time); return; }
            osc1.frequency.value = freq; osc2.frequency.value = freq; osc1.connect(filter); osc2.connect(filter); filter.connect(gain); gain.connect(musicState.reverb); gain.connect(masterGain); osc1.start(time); osc1.stop(time + duration + 1); osc2.start(time); osc2.stop(time + duration + 1);
        }

        function startSequencer() {
            if (!musicState.isPlaying || !musicState.ctx) return;
            const ctx = musicState.ctx, now = ctx.currentTime, { baseFreq, scale, style, bpm } = musicState.currentChannel, notes = SCALES[scale], beatTime = bpm > 0 ? 60 / bpm : 1.5;
            if (style === 'synth_pop') { playInstrument(0, 'kick', 0.2, now, 0.4); playInstrument(0, 'kick', 0.2, now + beatTime, 0.4); for(let i=0; i<8; i++) playInstrument(0, 'hihat', 0.05, now + i*(beatTime/2), 0.1); playInstrument(baseFreq/2, 'bass', beatTime*4, now, 0.3); notes.slice(0,3).forEach(p => playInstrument(baseFreq * Math.pow(2, p/12), 'pad', beatTime*4, now, 0.15)); musicState.sequencer = setTimeout(startSequencer, beatTime * 4 * 1000); }
            else if (style === 'piano_ballad') { [0, 2, 4, 7].forEach((n, i) => playInstrument(baseFreq * Math.pow(2, notes[n%notes.length]/12), 'piano', 2, now + i*0.1, 0.25)); playInstrument(baseFreq/2, 'bass', 3, now, 0.2); musicState.sequencer = setTimeout(startSequencer, beatTime * 2 * 1000); }
            else if (style === 'guitar_picking') { [0, 2, 1, 3, 1, 2].forEach((n, i) => playInstrument(baseFreq * Math.pow(2, notes[n%notes.length]/12), 'guitar', 0.5, now + i*(beatTime/2), 0.2)); musicState.sequencer = setTimeout(startSequencer, beatTime * 3 * 1000); }
            else if (style === 'fantasy_chimes') { if(Math.random() > 0.4) playInstrument(baseFreq * 2 * Math.pow(2, notes[Math.floor(Math.random()*notes.length)]/12), 'bell', 4, now, 0.2); playInstrument(baseFreq, 'pad', 5, now, 0.15); musicState.sequencer = setTimeout(startSequencer, 2500); }
            else { playInstrument(baseFreq/2, 'bass', 8, now, 0.5); playInstrument(baseFreq, 'pad', 8, now, 0.2); musicState.sequencer = setTimeout(startSequencer, 7000); }
        }

        function stopMusic() { musicState.isPlaying = false; if (musicState.sequencer) clearTimeout(musicState.sequencer); if (musicState.ctx) musicState.ctx.suspend(); document.getElementById('music-playing-indicator')?.classList.add('hidden'); }
        function playMusic() { initMusicAudio(); musicState.isPlaying = true; startSequencer(); document.getElementById('music-playing-indicator')?.classList.remove('hidden'); }

        function updateMusicVolume(vol) { if (musicState.masterGain && musicState.ctx) musicState.masterGain.gain.setValueAtTime(vol / 100, musicState.ctx.currentTime); const volBar = document.getElementById('music-vol-bar'); if (volBar) volBar.style.width = `${vol}%`; document.getElementById('music-vol-text').textContent = vol; }

        function changeMusicChannel(dir) {
            const idx = musicChannels.findIndex(c => c.id === musicState.currentChannel.id);
            const nextIdx = dir === 'next' ? (idx - 1 + musicChannels.length) % musicChannels.length : (idx + 1) % musicChannels.length;
            stopMusic(); musicState.currentChannel = musicChannels[nextIdx]; renderMusicApp(); setTimeout(playMusic, 200);
        }

        function renderMusicApp() {
            const ch = musicState.currentChannel;
            document.getElementById('music-bg-img').src = ch.imageUrl;
            document.getElementById('music-album-art').src = ch.imageUrl;
            document.getElementById('music-title').textContent = ch.title;
            document.getElementById('music-artist').textContent = ch.artist;
            const listEl = document.getElementById('music-channel-list'); listEl.innerHTML = '';
            musicChannels.forEach(c => {
                const el = document.createElement('div');
                el.className = `music-channel-item flex items-center gap-3 p-2.5 rounded-xl cursor-pointer hover:bg-white/5 ${musicState.currentChannel.id === c.id ? 'active' : ''}`;
                el.innerHTML = `<div class="w-10 h-10 rounded-lg overflow-hidden relative"><img src="${c.imageUrl}" class="w-full h-full object-cover"></div><div class="flex-1 text-sm font-medium text-white">${c.title}</div>`;
                el.onclick = (e) => { e.stopPropagation(); stopMusic(); musicState.currentChannel = c; renderMusicApp(); setTimeout(playMusic, 200); };
                listEl.appendChild(el);
            });
        }

        // --- Video Core Logic ---
        async function updateVideo() {
            if (state.currentChannel < 1) state.currentChannel = 30; if (state.currentChannel > 30) state.currentChannel = 1;
            const current = videoChannelMap[state.currentChannel];
            
            if (state.isPowerOn && !state.isStandbyMode && !state.isMusicMode) {
                const isEmbed = current.url.includes('naver.com/embed');
                
                if (isEmbed) {
                    tvVideo.classList.add('hidden');
                    if (playPromise) { try { await playPromise; } catch(e) {} }
                    tvVideo.pause();
                    tvIframe.classList.remove('hidden');
                    if (tvIframe.src !== current.url) tvIframe.src = current.url;
                } else {
                    tvIframe.classList.add('hidden');
                    tvIframe.src = "";
                    tvVideo.classList.remove('hidden');
                    tvVideo.muted = state.isMuted;
                    tvVideo.volume = state.currentVolume / 100;
                    
                    if (tvVideo.src !== current.url) {
                        if (playPromise) { try { await playPromise; } catch(e) {} }
                        tvVideo.pause();
                        tvVideo.src = current.url;
                        tvVideo.load();
                    }
                    
                    try {
                        playPromise = tvVideo.play();
                        await playPromise;
                    } catch (e) {
                        if (e.name !== 'AbortError') {
                            tvVideo.muted = true;
                            playPromise = tvVideo.play();
                        }
                    } finally {
                        playPromise = null;
                    }
                }
            }
        }

        function updateDisplay(showOSD = false, type = "standard") {
            clearTimeout(uiTimeout);
            document.getElementById('power-off-message').classList.toggle('hidden', state.isPowerOn);
            const showMedia = state.isPowerOn && !state.isStandbyMode && !state.isMusicMode;
            const currentData = videoChannelMap[state.currentChannel];
            const isEmbed = currentData?.url.includes('naver.com/embed');
            
            tvVideo.classList.toggle('hidden', !showMedia || isEmbed);
            tvIframe.classList.toggle('hidden', !showMedia || !isEmbed);
            
            document.getElementById('tv-ui-overlay').classList.toggle('hidden', !state.isPowerOn || state.isStandbyMode || state.isMusicMode);
            document.getElementById('standby-overlay').classList.toggle('hidden', !state.isStandbyMode);
            document.getElementById('home-iot-overlay').classList.toggle('hidden', !state.isHomeMode);
            
            if (state.isHomeMode) state.iotItems.forEach((item, idx) => { 
                const el = document.getElementById(`iot-${item.id}`); 
                el.classList.toggle('on', item.on); 
                if(item.type === 'vacuum') el.classList.toggle('vacuum-cleaning', item.on); 
                el.classList.toggle('focused', idx === state.focusedIotIndex); 
            });
            
            document.getElementById('gemini-recommendation-tray').classList.toggle('hidden', !state.isGeminiTrayOpen);
            document.getElementById('music-app-overlay').classList.toggle('hidden', !state.isMusicMode);
            if (state.isMusicMode) { document.getElementById('music-app-overlay').classList.add('active'); document.getElementById('music-bg-effect').classList.remove('hidden'); }
            else { document.getElementById('music-app-overlay').classList.remove('active'); document.getElementById('music-bg-effect').classList.add('hidden'); }
            
            document.getElementById('osd-channel-num').textContent = state.currentChannel;
            document.getElementById('osd-channel-name').textContent = currentData?.title || "Channel";
            document.getElementById('osd-volume-text').textContent = state.isMuted ? "MUTE" : state.currentVolume;
            
            if (showOSD && !state.isMusicMode && !state.isStandbyMode) {
                if (type === "vol") document.getElementById('osd-volume-bar').style.opacity = '1'; else document.getElementById('osd-channel-bar').style.opacity = '1';
                uiTimeout = setTimeout(() => { document.getElementById('osd-channel-bar').style.opacity = '0'; document.getElementById('osd-volume-bar').style.opacity = '0'; }, 3000);
            }
        }

        // --- Interaction Handlers ---
        function togglePower() {
            initMusicAudio();
            state.isPowerOn = !state.isPowerOn;
            if (state.isPowerOn) { state.currentChannel = state.lastChannel; state.currentVolume = state.lastVolume; updateVideo(); }
            else { 
                state.lastChannel = state.currentChannel; state.lastVolume = state.currentVolume; 
                state.isMusicMode = false; state.isStandbyMode = false; state.isHomeMode = false; state.isGeminiTrayOpen = false; 
                stopMusic(); 
                if (playPromise) { playPromise.then(() => tvVideo.pause()).catch(() => {}); } else { tvVideo.pause(); }
                tvVideo.src = ""; tvIframe.src = ""; 
            }
            updateDisplay(true);
        }

        // --- Fix: toggleStandby definition restored ---
        function toggleStandby() {
            if (!state.isPowerOn) return;
            if (clickSynth) clickSynth.triggerAttackRelease("C1", "8n");
            if (state.isStandbyMode) {
                state.isStandbyMode = false;
                if (clockInterval) clearInterval(clockInterval);
                updateVideo();
            } else {
                state.isHomeMode = false;
                state.isGeminiTrayOpen = false;
                state.isMusicMode = false;
                state.isStandbyMode = true;
                stopMusic();
                tvVideo.pause();
                if (tvIframe) tvIframe.src = "";
                
                const updateClock = () => {
                    const now = new Date();
                    document.getElementById('standby-time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                    document.getElementById('standby-date').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
                };
                updateClock();
                clockInterval = setInterval(updateClock, 1000);
            }
            updateDisplay();
        }

        function handleContents() {
            if (!state.isPowerOn) return;
            if (state.isGeminiTrayOpen) { state.isGeminiTrayOpen = false; updateDisplay(); return; }
            state.isGeminiLoading = true; document.getElementById('gemini-loader').classList.remove('hidden'); document.getElementById('gemini-text').classList.add('hidden');
            setTimeout(() => {
                state.recommendations = Array.from({length: 12}, (_, i) => {
                    const data = videoChannelMap[i + 1];
                    return { title: data.title, channel: i + 1 };
                });
                state.isGeminiTrayOpen = true; state.focusedRecommendationIndex = 0; state.isGeminiLoading = false;
                const tray = document.querySelector('#gemini-recommendation-tray .overflow-x-auto'); tray.innerHTML = '';
                state.recommendations.forEach((item, index) => {
                    const el = document.createElement('div'); el.className = `gemini-item ${index === state.focusedRecommendationIndex ? 'dpad-focused' : ''}`;
                    el.innerHTML = `<video src="${videoChannelMap[item.channel].url}" muted autoplay loop playsinline></video><div class="gemini-item-info"><p class="gemini-item-title">${item.title}</p><p class="gemini-item-channel">CH ${item.channel}</p></div>`;
                    el.onclick = (e) => { e.stopPropagation(); state.currentChannel = item.channel; state.isGeminiTrayOpen = false; updateVideo(); updateDisplay(true, "ch"); };
                    tray.appendChild(el);
                    if (index === state.focusedRecommendationIndex) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                });
                updateDisplay();
                document.getElementById('gemini-loader').classList.add('hidden'); document.getElementById('gemini-text').classList.remove('hidden');
            }, 800);
        }

        function masterDpad(key) {
            if (!state.isPowerOn) return;
            if (state.isGeminiTrayOpen) {
                if (key === 'left') state.focusedRecommendationIndex = Math.max(0, state.focusedRecommendationIndex - 1);
                else if (key === 'right') state.focusedRecommendationIndex = Math.min(state.recommendations.length - 1, state.focusedRecommendationIndex + 1);
                else if (key === 'ok') { state.currentChannel = state.recommendations[state.focusedRecommendationIndex].channel; state.isGeminiTrayOpen = false; updateVideo(); updateDisplay(true, "ch"); }
                const items = document.querySelectorAll('.gemini-item'); 
                items.forEach((el, i) => { 
                    el.classList.toggle('dpad-focused', i === state.focusedRecommendationIndex); 
                    if(i === state.focusedRecommendationIndex) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); 
                });
                return;
            }
            if (state.isHomeMode) {
                if (key === 'ok') { const item = state.iotItems[state.focusedIotIndex]; if(item) { item.on = !item.on; updateDisplay(); } }
                else { const nav = { 0:{r:1, d:5}, 1:{l:0, r:3, d:5}, 2:{l:3, d:4}, 3:{l:1, r:2, d:7}, 4:{l:3, d:7}, 5:{u:1, r:6}, 6:{u:3, l:5, r:7}, 7:{u:3, l:6, r:4} }; const n = nav[state.focusedIotIndex]?.[key==='left'?'l':key==='right'?'r':key==='up'?'u':'d']; if (n !== undefined) { state.focusedIotIndex = n; updateDisplay(); } }
                return;
            }
            if (state.isMusicMode) {
                if (key === 'up' || key === 'down') changeMusicChannel(key === 'up' ? 'next' : 'prev');
                else if (key === 'left') { musicState.volume = Math.max(0, musicState.volume - 10); updateMusicVolume(musicState.volume); updateDisplay(true, "vol"); }
                else if (key === 'right') { musicState.volume = Math.min(100, musicState.volume + 10); updateMusicVolume(musicState.volume); updateDisplay(true, "vol"); }
                return;
            }
        }

        // --- Event Binding ---
        document.getElementById('power-button').onclick = togglePower;
        document.getElementById('btn-standby').onclick = toggleStandby;
        document.getElementById('gemini-button').onclick = handleContents;
        document.getElementById('btn-music').onclick = () => {
            if (!state.isPowerOn) return;
            if (state.isMusicMode) { stopMusic(); state.isMusicMode = false; updateVideo(); updateDisplay(); return; }
            state.isMusicMode = true; state.isHomeMode = false; state.isGeminiTrayOpen = false; state.isStandbyMode = false;
            tvVideo.pause(); renderMusicApp(); playMusic(); updateDisplay();
        };
        document.getElementById('home-button').onclick = () => { 
            if(!state.isPowerOn) return; 
            state.isHomeMode = !state.isHomeMode; 
            if(state.isHomeMode) { state.isGeminiTrayOpen = false; state.isStandbyMode = false; state.isMusicMode = false; state.focusedIotIndex = 3; } else updateVideo(); 
            updateDisplay(); 
        };
        document.getElementById('ch-up').onclick = () => { if(!state.isPowerOn) return; if(state.isMusicMode) changeMusicChannel('next'); else { state.currentChannel++; updateVideo(); updateDisplay(true, "ch"); } };
        document.getElementById('ch-down').onclick = () => { if(!state.isPowerOn) return; if(state.isMusicMode) changeMusicChannel('prev'); else { state.currentChannel--; updateVideo(); updateDisplay(true, "ch"); } };
        document.getElementById('vol-up').onclick = () => { if(!state.isPowerOn) return; if(state.isMusicMode) { musicState.volume = Math.min(100, musicState.volume + 10); updateMusicVolume(musicState.volume); } else { state.currentVolume = Math.min(100, state.currentVolume + 10); updateVideo(); } updateDisplay(true, "vol"); };
        document.getElementById('vol-down').onclick = () => { if(!state.isPowerOn) return; if(state.isMusicMode) { musicState.volume = Math.max(0, musicState.volume - 10); updateMusicVolume(musicState.volume); } else { state.currentVolume = Math.max(0, state.currentVolume - 10); updateVideo(); } updateDisplay(true, "vol"); };
        document.getElementById('mute-button').onclick = () => { if(state.isPowerOn) { state.isMuted = !state.isMuted; if(tvVideo) tvVideo.muted = state.isMuted; updateDisplay(true, "vol"); } };
        document.getElementById('d-pad-ok').onclick = () => masterDpad('ok');
        document.getElementById('d-pad-up').onclick = () => masterDpad('up');
        document.getElementById('d-pad-down').onclick = () => masterDpad('down');
        document.getElementById('d-pad-left').onclick = () => masterDpad('left');
        document.getElementById('d-pad-right').onclick = () => masterDpad('right');

        document.onkeydown = (e) => {
            const keyMap = { '7':'power-button', '8':'btn-standby', '9':'ch-up', '6':'ch-down', '+':'vol-up', '-':'vol-down', '4':'mute-button', '5':'home-button', '1':'gemini-button', '2':'btn-music', 'ArrowUp':'d-pad-up', 'ArrowDown':'d-pad-down', 'ArrowLeft':'d-pad-left', 'ArrowRight':'d-pad-right', 'Enter':'d-pad-ok' };
            const id = keyMap[e.key];
            if (id) { const btn = document.getElementById(id); btn.classList.add('active-key'); setTimeout(() => btn.classList.remove('active-key'), 150); btn.click(); }
        };

        updateDisplay();
    });
    </script>
