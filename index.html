<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV 리모콘 시뮬레이터 (v115 - Contents Highlight Fix)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #111;
            user-select: none;
            -webkit-user-select: none;
        }
        .remote-button:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }
        .remote-button.active-key, .d-pad-button.active-key {
            transform: scale(0.95);
            filter: brightness(1.2);
            border-color: #fff;
        }
        #tv-screen {
            background-color: #000;
            position: relative;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 16 / 9;
            container-type: inline-size;
        }
        #tv-video-player {
            object-fit: cover;
            transition: opacity 0.5s;
            width: 100%; height: 100%;
        }
        .osd-container {
            background-color: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            color: white;
            border-radius: 9999px;
            padding: 1cqw 2cqw;
            display: flex;
            align-items: center;
            gap: 1.5cqw;
            transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
        }
        .d-pad-container {
            display: grid;
            grid-template-areas: "music up standby" "left ok right" ". down .";
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 0.5rem;
            align-items: center;
            justify-items: center;
        }
        #btn-standby { grid-area: standby; }
        #btn-music { grid-area: music; } 
        #d-pad-up { grid-area: up; }
        #d-pad-left { grid-area: left; }
        #d-pad-ok { grid-area: ok; }
        #d-pad-right { grid-area: right; }
        #d-pad-down { grid-area: down; }
        .d-pad-button {
            background-color: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 50%;
            width: 4rem; height: 4rem;
            display: flex; align-items: center; justify-content: center;
            color: #e4e4e7;
            transition: all 0.15s;
            cursor: pointer;
        }
        .d-pad-button:active { background-color: #3f3f46; transform: scale(0.92); }
        #d-pad-ok { background-color: #3f3f46; border-color: #52525b; font-weight: 600; }
        .loader {
            width: 1.25rem; height: 1.25rem;
            border: 2px solid #FFF; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            box-sizing: border-box; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #gemini-recommendation-tray .gemini-item {
            flex-shrink: 0; position: relative;
            width: 18cqw; 
            height: 12cqw;
            background-color: #1c1c1e; border-radius: 1cqw; overflow: hidden;
            cursor: pointer; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s, box-shadow 0.3s;
            border: 0.3cqw solid transparent; 
            box-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.5);
            box-sizing: border-box;
            scroll-margin: 2cqw;
        }
        #gemini-recommendation-tray .gemini-item.dpad-focused {
            border-color: #ffffff;
            box-shadow: 0 0 2.5cqw rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
            z-index: 10;
        }
        #gemini-recommendation-tray .gemini-item video, #gemini-recommendation-tray .gemini-item img { width: 100%; height: 100%; object-fit: cover; }
        #gemini-recommendation-tray .gemini-item-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 1cqw;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        #gemini-recommendation-tray .gemini-item-title { font-weight: 600; color: #fff; font-size: 1.1cqw; line-height: 1.2; margin-bottom: 0.1cqw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #gemini-recommendation-tray .gemini-item-channel { color: #d1d5db; font-size: 0.9cqw; font-weight: 500; opacity: 0.8; }
        
        #gemini-recommendation-tray .overflow-x-auto { 
            -ms-overflow-style: none; scrollbar-width: none; 
            mask-image: linear-gradient(to right, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 95%, transparent 100%);
            scroll-behavior: smooth;
        }
        #gemini-recommendation-tray .overflow-x-auto::-webkit-scrollbar { display: none; }

        #home-iot-overlay {
            background-color: rgba(30, 30, 35, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 2cqw;
            box-shadow: 0 2cqw 5cqw rgba(0,0,0,0.5);
            transition: opacity 0.3s; 
            pointer-events: auto;
        }
        .room-division {
            position: absolute; border: 0.1cqw solid rgba(255, 255, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.03);
            display: flex; align-items: center; justify-content: center;
        }
        .room-label { font-size: 0.8cqw; color: rgba(255,255,255,0.7); font-weight: 600; letter-spacing: 0.05em; }
        .iot-item {
            position: absolute; transform: translate(-50%, -50%); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0.5cqw 1cqw rgba(0,0,0,0.3); z-index: 50;
            cursor: pointer; 
            width: 3.5cqw; height: 3.5cqw; border-radius: 50%;
            background: #27272a; color: #a1a1aa;
        }
        .iot-item.focused { 
            border: 0.3cqw solid #f97316;
            box-shadow: 0 0 1.5cqw rgba(249, 115, 22, 0.6); 
            transform: translate(-50%, -50%) scale(1.25); 
            z-index: 60; 
        }
        .iot-item.on {
            background: #fcd34d !important; color: #451a03 !important;
            box-shadow: 0 0 2.5cqw rgba(252, 211, 77, 0.6) !important; z-index: 70;
        }
        .iot-item i, .iot-item svg { width: 1.8cqw; height: 1.8cqw; }
        .audio-system { border-radius: 0.8cqw; }
        
        @keyframes vacuum-move {
            0% { left: 40%; top: 40%; }
            25% { left: 65%; top: 20%; }
            50% { left: 55%; top: 70%; }
            75% { left: 45%; top: 30%; }
            100% { left: 40%; top: 40%; }
        }
        .vacuum-cleaning { animation: vacuum-move 12s linear infinite !important; }
        
        .remote-btn-style {
            background-color: #27272a;
            border: 1px solid #3f3f46;
            color: #f4f4f5;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.1s;
            cursor: pointer;
        }
        .remote-btn-style:active { background-color: #3f3f46; transform: scale(0.95); }
        
        #standby-overlay-content {
            transform: scale(0.4); 
            transform-origin: top right; 
            position: absolute;
            top: 4cqw;   
            right: 4cqw; 
        }
        #standby-overlay { 
            background-color: black; 
            transition: opacity 1s ease-in-out; 
            z-index: 30; 
            width: 100%;
            height: 100%;
        }
        .video-hidden { opacity: 0 !important; }
        .font-sf-display { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 200; letter-spacing: -0.02em; }
        
        #music-app-overlay {
            transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            top: 50%;
            right: 3rem;
            left: auto;
            transform: translateY(-50%) scale(0.55); 
            transform-origin: right center; 
        }
        #music-app-overlay.active {
            opacity: 1;
            transform: translateY(-50%) scale(0.55);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .music-channel-item.active {
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-neutral-900 min-h-screen flex flex-col items-center justify-center p-6 text-white select-none">

                        <div id="music-channel-list" class="flex flex-col gap-1 flex-1 overflow-y-auto custom-scrollbar pb-2"></div>
                    </div>
                </div>
            </div>
            
            <!-- Standby Overlay -->
            <div id="standby-overlay" class="absolute top-0 left-0 w-full h-full hidden flex flex-col justify-start items-end p-8"> 
                <div id="standby-overlay-content" class="flex flex-col items-end text-right">

                            <span id="osd-channel-num" class="text-[4cqw] font-light tracking-tighter">1</span>
                            <span id="osd-channel-name" class="text-[2.2cqw] font-medium text-white/90 truncate max-w-[25cqw]">Channel Name</span>

                    <div class="room-division" style="top: 0; left: 35%; width: 40%; height: 100%;"><span class="room-label">LIVING</span></div>

    <script>
    const SCALES = { dream: [0, 4, 7, 11, 14], jazz: [0, 3, 7, 10, 14], folk: [0, 2, 4, 7, 9], mystic: [0, 2, 4, 6, 9], deep: [0, 5, 7, 12] };

        function initAudio() {
            if (clickSynth) return;
            if (typeof Tone === 'undefined') return;
            Tone.start().then(() => {
                clickSynth = new Tone.MembraneSynth({ pitchDecay: 0.01, octaves: 2, envelope: { attack: 0.001, decay: 0.1, sustain: 0 } }).toDestination();
                confirmSynth = new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.1 } }).toDestination();
                errorSynth = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } }).toDestination();
                const synth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" }, envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 } }).toDestination();
                synth.volume.value = -10;
                musicLoop = new Tone.Loop(time => { synth.triggerAttackRelease(["C4", "E4", "G4", "B4"], "2n", time); }, "1n");
                initMusicAudio();
            }).catch(e => console.warn("Tone init failed", e));
        }

        function playClick() { if (clickSynth) clickSynth.triggerAttackRelease("C1", "8n", Tone.now()); }
        function playConfirm() { if (confirmSynth) confirmSynth.triggerAttackRelease("C5", "8n", Tone.now()); }

        function initMusicAudio() {
            if (!musicState.ctx && (window.AudioContext || window.webkitAudioContext)) {
                musicState.ctx = new (window.AudioContext || window.webkitAudioContext)();
                musicState.masterGain = musicState.ctx.createGain();
                musicState.masterGain.connect(musicState.ctx.destination);
                const duration = 3, length = musicState.ctx.sampleRate * duration;
                const impulse = musicState.ctx.createBuffer(2, length, musicState.ctx.sampleRate);
                for (let i = 0; i < length; i++) {
                    const decay = Math.pow(1 - i / length, 2);
                    impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * decay;
                    impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * decay;
                }
                musicState.reverb = musicState.ctx.createConvolver();
                musicState.reverb.buffer = impulse;
                musicState.reverb.connect(musicState.masterGain);
                updateMusicVolume(musicState.volume);
            }
        }

        function updateMusicVolume(vol) {
            if (musicState.masterGain && musicState.ctx) musicState.masterGain.gain.setValueAtTime(vol / 100, musicState.ctx.currentTime);
            const volBar = document.getElementById('music-vol-bar');
            if (volBar) volBar.style.width = `${vol}%`;
            const volText = document.getElementById('music-vol-text');
            if (volText) volText.textContent = vol;
        }

        function playInstrument(freq, type, duration, time, vol = 0.1) {
            if (!musicState.ctx || !musicState.isPlaying) return;
            const ctx = musicState.ctx;
            const masterGain = musicState.masterGain;
            const osc1 = ctx.createOscillator();
            const osc2 = ctx.createOscillator();
            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();
            
            if (type === 'piano') {
                osc1.type = 'triangle'; osc1.frequency.value = freq;
                osc2.type = 'sine'; osc2.frequency.value = freq; osc2.detune.value = 5;
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
                filter.type = 'lowpass'; filter.frequency.value = 3000;
            } else if (type === 'pad') {
                osc1.type = 'sawtooth'; osc1.frequency.value = freq;
                osc2.type = 'triangle'; osc2.frequency.value = freq; osc2.detune.value = -10;
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol*0.5, time + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.001, time + duration + 1);
                filter.type = 'lowpass'; filter.frequency.value = 800;
            } else if (type === 'bass') {
                 osc1.type = 'sawtooth'; osc1.frequency.value = freq;
                 osc2.type = 'square'; osc2.frequency.value = freq/2;
                 gain.gain.setValueAtTime(0, time);
                 gain.gain.linearRampToValueAtTime(vol, time + 0.05);
                 gain.gain.linearRampToValueAtTime(0, time + duration);
                 filter.type = 'lowpass'; filter.frequency.value = 400;
            } else if (type === 'bell') {
                 osc1.type = 'sine'; osc1.frequency.value = freq;
                 osc2.type = 'sine'; osc2.frequency.value = freq * 2;
                 gain.gain.setValueAtTime(0, time);
                 gain.gain.linearRampToValueAtTime(vol, time + 0.01);
                 gain.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
                 filter.type = 'highpass'; filter.frequency.value = 1000;
            } else if (type === 'guitar') {
                osc1.type = 'triangle'; osc1.frequency.value = freq;
                osc2.type = 'sawtooth'; osc2.frequency.value = freq; osc2.detune.value = 3;
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
                filter.type = 'lowpass'; filter.frequency.value = 2000;
            } else if (type === 'kick') {
                osc1.type = 'sine'; 
                osc1.frequency.setValueAtTime(150, time);
                osc1.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
                gain.gain.setValueAtTime(vol, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
                osc1.connect(gain); gain.connect(masterGain);
                osc1.start(time); osc1.stop(time + 0.6);
                return;
            } else if (type === 'hihat') {
                const bufferSize = ctx.sampleRate * 0.1;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 5000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(vol*0.4, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
                noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterGain);
                noise.start(time);
                return;
            }

            osc1.connect(filter); osc2.connect(filter);
            filter.connect(gain); gain.connect(musicState.reverb); gain.connect(masterGain);
            osc1.start(time); osc1.stop(time + duration + 1);
            osc2.start(time); osc2.stop(time + duration + 1);
        }

        function startSequencer() {
            if (!musicState.isPlaying || !musicState.ctx) return;
            const ctx = musicState.ctx;
            const now = ctx.currentTime;
            const { baseFreq, scale, style, bpm } = musicState.currentChannel;
            const notes = SCALES[scale];
            const beatTime = bpm > 0 ? 60 / bpm : 1.5;

            if (style === 'synth_pop') {
                playInstrument(0, 'kick', 0.2, now, 0.4);
                playInstrument(0, 'kick', 0.2, now + beatTime, 0.4);
                playInstrument(0, 'kick', 0.2, now + beatTime*2, 0.4);
                playInstrument(0, 'kick', 0.2, now + beatTime*3, 0.4);
                for(let i=0; i<8; i++) playInstrument(0, 'hihat', 0.05, now + i*(beatTime/2), 0.1);
                playInstrument(baseFreq/2, 'bass', beatTime*4, now, 0.3);
                [0, 2, 4].forEach(i => {
                     const pitch = notes[i % notes.length];
                     const freq = baseFreq * Math.pow(2, pitch/12);
                     playInstrument(freq, 'pad', beatTime*4, now, 0.15);
                });
                 musicState.sequencer = setTimeout(startSequencer, beatTime * 4 * 1000);
            } else if (style === 'piano_ballad') {
                 [0, 2, 4, 7].forEach((n, i) => {
                     const pitch = notes[n % notes.length];
                     const freq = baseFreq * Math.pow(2, pitch/12);
                     playInstrument(freq, 'piano', 2, now + i*0.1 + (Math.random()*0.05), 0.25);
                 });
                 playInstrument(baseFreq/2, 'bass', 3, now, 0.2);
                 musicState.sequencer = setTimeout(startSequencer, beatTime * 2 * 1000);
            } else if (style === 'guitar_picking') {
                 [0, 2, 1, 3, 1, 2].forEach((n, i) => {
                    const pitch = notes[n % notes.length];
                    const freq = baseFreq * Math.pow(2, pitch/12);
                    playInstrument(freq, 'guitar', 0.5, now + i*(beatTime/2), 0.2);
                 });
                 musicState.sequencer = setTimeout(startSequencer, beatTime * 3 * 1000);
            } else if (style === 'fantasy_chimes') {
                 if(Math.random() > 0.4) {
                     const pitch = notes[Math.floor(Math.random()*notes.length)];
                     const freq = baseFreq * 2 * Math.pow(2, pitch/12);
                     playInstrument(freq, 'bell', 4, now, 0.2);
                 }
                 playInstrument(baseFreq, 'pad', 5, now, 0.15);
                 musicState.sequencer = setTimeout(startSequencer, 2500);
            } else {
                playInstrument(baseFreq/2, 'bass', 8, now, 0.5);
                playInstrument(baseFreq, 'pad', 8, now, 0.2);
                musicState.sequencer = setTimeout(startSequencer, 7000);
            }
        }

        function handleGeminiSuggestInternal() {
            if (!state.isPowerOn) return;
            if (state.isGeminiTrayOpen) { state.isGeminiTrayOpen = false; updateTVDisplay(); return; }
            if (state.isGeminiLoading) return;
            state.isGeminiLoading = true; 
            if(geminiLoader) geminiLoader.classList.remove('hidden'); 
            if(geminiText) geminiText.classList.add('hidden');
            setTimeout(() => {
                state.recommendations = [
                    { title: "Sintel Trailer", channel: 1 }, { title: "MLB Highlights", channel: 2 }, { title: "Coastal Drone Flight", channel: 3 },
                    { title: "Ski Jump", channel: 4 }, { title: "Big Buck Bunny", channel: 5 }, { title: "Elephants Dream", channel: 6 },
                    { title: "Friday Life", channel: 7 }, { title: "Sintel Adventure", channel: 8 }, { title: "Jellyfish Nature", channel: 9 },
                    { title: "Baseball Best", channel: 10 }, { title: "Movie Sintel", channel: 1 }, { title: "Sport MLB", channel: 2 }
                ];
                state.isGeminiTrayOpen = true; 
                state.focusedRecommendationIndex = 0; 
                state.isGeminiLoading = false;
                renderGeminiTrayContent(); 
                playConfirm(); 
                updateTVDisplay();
                if(geminiLoader) geminiLoader.classList.add('hidden');
                if(geminiText) geminiText.classList.remove('hidden');
            }, 800);
        }

        const volumeUp = () => { 
            if(!state.isPowerOn) return; 
            playClick(); 
            if (state.isMusicMode) {
                musicState.volume = Math.min(100, musicState.volume + 10);
                updateMusicVolume(musicState.volume);
            } else {
                state.currentVolume = Math.min(100, state.currentVolume+10);

            updateTVDisplay(true, "vol"); 
        };

        const volumeDown = () => { 
            if(!state.isPowerOn) return; 
            playClick(); 
            if (state.isMusicMode) {
                musicState.volume = Math.max(0, musicState.volume - 10);
                updateMusicVolume(musicState.volume);
            } else {
                state.currentVolume = Math.max(0, state.currentVolume-10); 
                updateVideoForChannel(); 
            }
            updateTVDisplay(true, "vol"); 
        };

        function togglePower() {
            initAudio(); playClick();
            state.isPowerOn = !state.isPowerOn;
            if (state.isPowerOn) {
                state.currentChannel = state.lastChannel; 
                state.currentVolume = state.lastVolume; 
                updateVideoForChannel();
            } else {
                state.lastChannel = state.currentChannel; 
                state.lastVolume = state.currentVolume;
                state.isMusicMode = false; state.isStandbyMode = false; state.isHomeMode = false; state.isGeminiTrayOpen = false;
                if(clockInterval) clearInterval(clockInterval);
                stopMusicAppAudio();
                if(tvVideoPlayer) { tvVideoPlayer.pause(); tvVideoPlayer.src = ""; }
            }
            updateTVDisplay(true);
        }

        function toggleStandby() {
            if (!state.isPowerOn) return; playClick();
            if (state.isStandbyMode) {
                state.isStandbyMode = false;
                if(clockInterval) clearInterval(clockInterval);
                updateVideoForChannel(); 
            } else {
                state.isHomeMode = false; state.isGeminiTrayOpen = false; state.isMusicMode = false;
                state.isStandbyMode = true;
                stopMusicAppAudio();
                if(tvVideoPlayer) tvVideoPlayer.pause();
                updateClock();
                clockInterval = setInterval(updateClock, 1000);
            }
            updateTVDisplay();
        }

        function toggleHomeMode() {
            if (!state.isPowerOn) return; playClick();
            state.isHomeMode = !state.isHomeMode;
            if (state.isHomeMode) {
                state.isGeminiTrayOpen = false; state.isStandbyMode = false; state.isMusicMode = false;
                state.focusedIotIndex = 3; 
                playConfirm();
            } else {
                updateVideoForChannel();
            }
            updateTVDisplay();
        }

        function toggleMusicMode() {
            if (!state.isPowerOn) return; playClick();
            if (state.isMusicMode) {
                stopMusicAppAudio();
                state.isMusicMode = false;
                updateVideoForChannel();
                updateTVDisplay();
                return;
            }
            state.isMusicMode = true;
            state.isHomeMode = false; state.isGeminiTrayOpen = false; state.isStandbyMode = false;
            if(tvVideoPlayer) tvVideoPlayer.pause();
            renderMusicApp();
            playMusicAppAudio();
            updateTVDisplay();
        }

        function updateClock() {
            const now = new Date();
            if (standbyTime) standbyTime.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            if (standbyDate) standbyDate.textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
        }

        function masterDpadHandler(key) {
            if (!state.isPowerOn) return;
            playClick();
            if (state.isGeminiTrayOpen) {
                if (key === 'left') state.focusedRecommendationIndex = Math.max(0, state.focusedRecommendationIndex - 1);
                else if (key === 'right') state.focusedRecommendationIndex = Math.min(state.recommendations.length - 1, state.focusedRecommendationIndex + 1);
                else if (key === 'ok') {
                    state.currentChannel = state.recommendations[state.focusedRecommendationIndex].channel;
                    state.isGeminiTrayOpen = false; updateVideoForChannel(); updateTVDisplay(true, "ch");
                }
                renderGeminiTrayContent();
                return;
            }
            if (state.isHomeMode) {
                if (key === 'ok') {
                    const item = state.iotItems[state.focusedIotIndex];
                    if(item) { item.on = !item.on; playConfirm(); updateTVDisplay(); }
                } else {
                    const nav = { 0:{r:1, d:5}, 1:{l:0, r:3, d:5}, 2:{l:3, d:4}, 3:{l:1, r:2, d:7}, 4:{l:3, d:7}, 5:{u:1, r:6}, 6:{u:3, l:5, r:7}, 7:{u:3, l:6, r:4} };
                    const dirMap = { left:'l', right:'r', up:'u', down:'d' };
                    const n = nav[state.focusedIotIndex]?.[dirMap[key]];
                    if (n !== undefined) { state.focusedIotIndex = n; updateTVDisplay(); }
                }
                return;
            }
            if (state.isMusicMode) {
                if (key === 'up' || key === 'down') {
                    changeMusicChannel(key === 'up' ? 'next' : 'prev');
                    return;
                }
                if (key === 'left') volumeDown();
                else if (key === 'right') volumeUp();
                return;
            }
        }

        // --- Event Listeners ---
        powerButton.addEventListener('click', togglePower);
        standbyButton.addEventListener('click', toggleStandby);
        homeButton.addEventListener('click', toggleHomeMode);
        musicButton.addEventListener('click', toggleMusicMode);
        geminiButton.addEventListener('click', handleGeminiSuggestInternal);
        
        chUpButton.addEventListener('click', () => { 
            if(!state.isPowerOn) return; 
            playClick(); 
            if (state.isMusicMode) changeMusicChannel('next');
            else { state.currentChannel++; updateVideoForChannel(); updateTVDisplay(true, "ch"); }
        });
        chDownButton.addEventListener('click', () => { 
            if(!state.isPowerOn) return; 
            playClick(); 
            if (state.isMusicMode) changeMusicChannel('prev');
            else { state.currentChannel--; updateVideoForChannel(); updateTVDisplay(true, "ch"); }
        });
        volUpButton.addEventListener('click', volumeUp);
        volDownButton.addEventListener('click', volumeDown);
        muteButton.addEventListener('click', () => { if(state.isPowerOn) { state.isMuted = !state.isMuted; if(tvVideoPlayer) tvVideoPlayer.muted = state.isMuted; updateTVDisplay(true, "vol"); } });
        dPadOk.addEventListener('click', () => masterDpadHandler('ok'));
        dPadUp.addEventListener('click', () => masterDpadHandler('up'));
        dPadDown.addEventListener('click', () => masterDpadHandler('down'));
        dPadLeft.addEventListener('click', () => masterDpadHandler('left'));
        dPadRight.addEventListener('click', () => masterDpadHandler('right'));

        document.addEventListener('keydown', (e) => {
            const keyMap = { '7':powerButton, '8':standbyButton, '9':chUpButton, '6':chDownButton, '+':volUpButton, '-':volDownButton, '4':muteButton, '5':homeButton, '1':geminiButton, '2':musicButton, 'ArrowUp':dPadUp, 'ArrowDown':dPadDown, 'ArrowLeft':dPadLeft, 'ArrowRight':dPadRight, 'Enter':dPadOk };
            const btn = keyMap[e.key];
            if (btn) {
                btn.classList.add('active-key'); setTimeout(() => btn.classList.remove('active-key'), 150);
                if (e.key === '7') togglePower(); 
                else if (e.key === '8') toggleStandby(); 
                else if (e.key === '9') chUpButton.click(); 
                else if (e.key === '6') chDownButton.click();
                else if (e.key === '+') volumeUp(); 
                else if (e.key === '-') volumeDown();
                else if (e.key === '4') muteButton.click(); 
                else if (e.key === '5') toggleHomeMode(); 
                else if (e.key === '1') handleGeminiSuggestInternal(); 
                else if (e.key === '2') toggleMusicMode();
                else if (e.key.startsWith('Arrow')) masterDpadHandler(e.key.replace('Arrow', '').toLowerCase()); 
                else if (e.key === 'Enter') masterDpadHandler('ok');
            }
        });
        updateTVDisplay();
    });
    </script>
</body>
</html>
